<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Manrope:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "secondary-fixed": "#ceeacf",
                    "primary-container": "#ffbebd",
                    "on-background": "#1d1b1b",
                    "inverse-on-surface": "#f5efef",
                    "surface-bright": "#fef8f8",
                    "surface-variant": "#e7e1e1",
                    "on-error": "#ffffff",
                    "on-primary-fixed": "#3a090d",
                    "surface-container-lowest": "#ffffff",
                    "on-secondary-container": "#526a55",
                    "on-secondary-fixed": "#092010",
                    "inverse-surface": "#323030",
                    "tertiary-fixed": "#ffd9e1",
                    "on-tertiary-fixed": "#3f001b",
                    "tertiary-container": "#ffbccc",
                    "outline": "#827473",
                    "on-secondary-fixed-variant": "#354c39",
                    "on-error-container": "#93000a",
                    "on-tertiary-container": "#8e3b56",
                    "error-container": "#ffdad6",
                    "surface-container-highest": "#e7e1e1",
                    "on-surface": "#1d1b1b",
                    "primary-fixed": "#ffdad9",
                    "on-surface-variant": "#504444",
                    "surface": "#fef8f8",
                    "on-tertiary-fixed-variant": "#792b46",
                    "on-secondary": "#ffffff",
                    "primary": "#8e4a4b",
                    "on-primary-fixed-variant": "#723435",
                    "error": "#ba1a1a",
                    "on-primary": "#ffffff",
                    "secondary-fixed-dim": "#b3cdb4",
                    "surface-dim": "#ded9d9",
                    "secondary-container": "#ceeacf",
                    "tertiary-fixed-dim": "#ffb1c5",
                    "surface-tint": "#8e4a4b",
                    "on-tertiary": "#ffffff",
                    "secondary": "#4c644f",
                    "on-primary-container": "#864445",
                    "background": "#fef8f8",
                    "tertiary": "#97425d",
                    "surface-container": "#f2ecec",
                    "surface-container-low": "#f8f2f2",
                    "inverse-primary": "#ffb3b2",
                    "primary-fixed-dim": "#ffb3b2",
                    "outline-variant": "#d4c2c2",
                    "surface-container-high": "#ece7e7"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Instrument Serif"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-transition {
            transition: background-color 0.8s ease;
        }
        .phase-bloom {
            background: radial-gradient(circle at center, #ceeacf 0%, transparent 70%);
            filter: blur(80px);
            opacity: 0.4;
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary-container">
<!-- TopNavBar (Shared Component Shell) -->
<header class="fixed top-0 w-full z-50 bg-stone-50/80 dark:bg-stone-950/80 backdrop-blur-xl">
<nav class="flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-4">
<button class="hover:opacity-70 transition-opacity">
<span class="material-symbols-outlined text-on-surface">close</span>
</button>
<span class="font-['Instrument_Serif'] italic text-2xl text-stone-800 dark:text-stone-100">RoseCycle</span>
</div>
<div class="flex items-center gap-6">
<span class="material-symbols-outlined text-stone-500 dark:text-stone-400 hover:opacity-70 transition-opacity cursor-pointer">account_circle</span>
<span class="material-symbols-outlined text-stone-500 dark:text-stone-400 hover:opacity-70 transition-opacity cursor-pointer">settings</span>
</div>
</nav>
</header>
<main class="relative min-h-screen flex flex-col items-center justify-center overflow-hidden px-6 pt-20 pb-32">
<!-- Background Bloom Decoration -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="phase-bloom absolute -top-20 -left-20 w-96 h-96"></div>
<div class="phase-bloom absolute -bottom-40 -right-40 w-[30rem] h-[30rem] bg-primary-container/20"></div>
</div>
<!-- Content Canvas -->
<section class="relative z-10 w-full max-w-lg flex flex-col items-center text-center space-y-12">
<!-- Context Header -->
<div class="space-y-2">
<h2 class="font-['Instrument_Serif'] text-4xl md:text-5xl text-on-surface">Digital Sanctuary</h2>
<p class="text-on-surface-variant font-medium tracking-wide uppercase text-[10px] md:text-xs">Box Breathing • 5 Minutes</p>
</div>
<!-- Breathing Sphere Container -->
<div class="relative flex items-center justify-center w-full aspect-square max-w-[320px]">
<!-- Outer Ring (Glassmorphism) -->
<div class="absolute inset-0 rounded-full border border-outline-variant/15 scale-110"></div>
<!-- Main Breathing Orb -->
<div class="w-full h-full rounded-full bg-gradient-to-br from-secondary-fixed to-secondary-container flex items-center justify-center shadow-2xl shadow-secondary-fixed/30 relative">
<!-- Glass Overlay -->
<div class="absolute inset-4 rounded-full bg-white/20 backdrop-blur-md border border-white/30 flex flex-col items-center justify-center">
<span class="font-['Instrument_Serif'] italic text-6xl text-on-secondary-container">Inhale</span>
<span class="font-['Instrument_Serif'] text-2xl text-on-secondary-container/60 mt-2">4s</span>
</div>
</div>
<!-- Secondary Accents -->
<div class="absolute -z-10 w-full h-full rounded-full bg-primary-container/20 blur-3xl"></div>
</div>
<!-- Instruction Grid (Bento Style) -->
<div class="grid grid-cols-2 md:grid-cols-4 gap-4 w-full">
<div class="p-6 bg-surface-container rounded-xl flex flex-col items-center justify-center space-y-1">
<span class="text-xs font-semibold text-secondary uppercase tracking-widest">In</span>
<span class="font-['Instrument_Serif'] text-2xl text-on-surface">4.0</span>
</div>
<div class="p-6 bg-surface-container-low rounded-xl flex flex-col items-center justify-center space-y-1 border border-outline-variant/15">
<span class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest">Hold</span>
<span class="font-['Instrument_Serif'] text-2xl text-on-surface">4.0</span>
</div>
<div class="p-6 bg-surface-container-low rounded-xl flex flex-col items-center justify-center space-y-1 border border-outline-variant/15">
<span class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest">Out</span>
<span class="font-['Instrument_Serif'] text-2xl text-on-surface">4.0</span>
</div>
<div class="p-6 bg-surface-container-low rounded-xl flex flex-col items-center justify-center space-y-1 border border-outline-variant/15">
<span class="text-xs font-semibold text-on-surface-variant uppercase tracking-widest">Hold</span>
<span class="font-['Instrument_Serif'] text-2xl text-on-surface">4.0</span>
</div>
</div>
<!-- Audio/Control Footer -->
<div class="flex items-center gap-8 pt-4">
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-highest text-on-surface-variant hover:bg-secondary-container hover:text-on-secondary-container transition-all">
<span class="material-symbols-outlined">graphic_eq</span>
</button>
<button class="w-20 h-20 flex items-center justify-center rounded-full bg-gradient-to-br from-primary to-primary-container text-on-primary shadow-lg shadow-primary/20 scale-95 hover:scale-100 transition-transform">
<span class="material-symbols-outlined !text-4xl" data-weight="fill">pause</span>
</button>
<button class="w-12 h-12 flex items-center justify-center rounded-full bg-surface-container-highest text-on-surface-variant hover:bg-secondary-container hover:text-on-secondary-container transition-all">
<span class="material-symbols-outlined">timer</span>
</button>
</div>
</section>
</main>
<!-- BottomNavBar (Shared Component Shell) -->
<!-- Determined active: Sanctuary based on 'Digital Sanctuary' theme -->
<nav class="fixed bottom-0 left-0 w-full flex justify-around items-center px-4 pb-6 pt-4 bg-white/70 dark:bg-stone-950/70 backdrop-blur-2xl rounded-t-[3rem] z-50 shadow-[0px_-12px_32px_rgba(29,27,27,0.06)]">
<div class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-5 py-2 hover:text-stone-600 dark:hover:text-stone-300 transition-colors cursor-pointer">
<span class="material-symbols-outlined">radio_button_checked</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest mt-1">Cycle</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-5 py-2 hover:text-stone-600 dark:hover:text-stone-300 transition-colors cursor-pointer">
<span class="material-symbols-outlined">self_improvement</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest mt-1">Wellness</span>
</div>
<div class="flex flex-col items-center justify-center text-stone-400 dark:text-stone-500 px-5 py-2 hover:text-stone-600 dark:hover:text-stone-300 transition-colors cursor-pointer">
<span class="material-symbols-outlined">face_6</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest mt-1">Skin</span>
</div>
<div class="flex flex-col items-center justify-center bg-[#F4C2C2]/20 text-stone-900 dark:text-[#F4C2C2] rounded-full px-5 py-2 cursor-pointer">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">air</span>
<span class="font-['Manrope'] text-[10px] font-semibold uppercase tracking-widest mt-1">Sanctuary</span>
</div>
</nav>
<!-- Optional Visual Texture Image (Subtle Background) -->
<div class="fixed inset-0 -z-20 opacity-10 pointer-events-none">
<img class="w-full h-full object-cover" data-alt="abstract macro photography of soft pink silk fabric with gentle ripples and cinematic soft lighting bokeh" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCPKuU-LY9peyb8WcjaP3-67RFmS19TGkdMLmCDA1fulKpqCS12-gs2LigWDVAAO3SDUYYcRp12dhXIkFpnahweYEtVF6AAjZ1v38yUsfayn4WcPgGE01_W1b0bVtJJUtPuuhgdOGyUTzWXL5VDHUNgIrJ22RGJqWaPlnr5cOne7I2rUfSobnTOFLzfKnvcBbLFs0fcGCY725bK6iIm9xI3WQPp3mWeTgQHUr6pzKkg7jazwkc7qGkWz6RQDI7upzddiOAqG3VN0II"/>
</div>
</body></html>
