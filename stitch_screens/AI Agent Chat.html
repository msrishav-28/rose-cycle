<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&amp;family=Manrope:wght@400;500;600;700&amp;family=Noto+Serif:wght@400;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-background": "#1d1b1b",
                        "secondary-fixed": "#ceeacf",
                        "primary-fixed-dim": "#ffb3b2",
                        "primary-container": "#ffbebd",
                        "secondary": "#4c644f",
                        "tertiary-fixed": "#ffd9e1",
                        "surface-container-highest": "#e7e1e1",
                        "on-secondary-fixed-variant": "#354c39",
                        "primary": "#8e4a4b",
                        "tertiary": "#97425d",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-fixed": "#3f001b",
                        "on-primary-fixed-variant": "#723435",
                        "outline-variant": "#d4c2c2",
                        "surface-container-high": "#ece7e7",
                        "on-tertiary-container": "#8e3b56",
                        "tertiary-container": "#ffbccc",
                        "on-tertiary": "#ffffff",
                        "surface-container": "#f2ecec",
                        "on-secondary": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-secondary-container": "#526a55",
                        "background": "#fef8f8",
                        "on-error-container": "#93000a",
                        "surface-tint": "#8e4a4b",
                        "inverse-primary": "#ffb3b2",
                        "outline": "#827473",
                        "on-primary-container": "#864445",
                        "surface-variant": "#e7e1e1",
                        "tertiary-fixed-dim": "#ffb1c5",
                        "on-surface-variant": "#504444",
                        "secondary-container": "#ceeacf",
                        "error": "#ba1a1a",
                        "primary-fixed": "#ffdad9",
                        "secondary-fixed-dim": "#b3cdb4",
                        "surface-container-low": "#f8f2f2",
                        "surface": "#fef8f8",
                        "inverse-surface": "#323030",
                        "inverse-on-surface": "#f5efef",
                        "on-tertiary-fixed-variant": "#792b46",
                        "on-primary-fixed": "#3a090d",
                        "error-container": "#ffdad6",
                        "on-surface": "#1d1b1b",
                        "surface-dim": "#ded9d9",
                        "surface-bright": "#fef8f8",
                        "on-error": "#ffffff",
                        "on-secondary-fixed": "#092010"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Noto Serif"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #fef8f8;
            background-image: radial-gradient(circle at 0% 0%, #ffdad9 0%, transparent 35%),
                              radial-gradient(circle at 100% 100%, #ceeacf 0%, transparent 35%);
        }
    </style>
</head>
<body class="font-body text-on-surface min-h-screen flex flex-col">
<!-- TopNavBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-transparent backdrop-blur-xl">
<div class="font-['Instrument_Serif'] text-2xl text-[#F4C2C2] italic">RoseCycle</div>
<div class="flex gap-4">
<button class="text-slate-400 hover:opacity-80 transition-opacity active:transition-transform scale-95">
<span class="material-symbols-outlined">dark_mode</span>
</button>
<button class="text-slate-400 hover:opacity-80 transition-opacity active:transition-transform scale-95">
<span class="material-symbols-outlined">account_circle</span>
</button>
</div>
</header>
<!-- Main Chat Canvas -->
<main class="flex-grow pt-24 pb-44 px-6 max-w-2xl mx-auto w-full flex flex-col justify-end">
<!-- Conversation Thread -->
<div class="space-y-8 flex flex-col">
<!-- Rose Intro Message -->
<div class="flex flex-col gap-4 items-start max-w-[85%]">
<div class="flex items-center gap-3 ml-2">
<div class="w-10 h-10 rounded-full bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
</div>
<span class="font-label text-label-md text-on-surface-variant font-semibold">Rose</span>
</div>
<div class="glass p-6 rounded-t-xl rounded-br-xl shadow-sm border-0">
<h1 class="font-headline text-headline-md mb-3 text-on-surface">Hi! I'm here to help you understand your cycle.</h1>
<p class="body-lg text-on-surface-variant">You can ask me things like <span class="italic text-primary">"Why do I feel tired today?"</span> or <span class="italic text-primary">"What's the luteal phase?"</span></p>
</div>
</div>
<!-- Suggestion Chips Container -->
<div class="flex flex-wrap gap-2 mt-4">
<button class="glass px-5 py-2.5 rounded-full text-label-md font-semibold text-primary border-0 hover:bg-white transition-colors">
                    Phase explainer
                </button>
<button class="glass px-5 py-2.5 rounded-full text-label-md font-semibold text-primary border-0 hover:bg-white transition-colors">
                    Nutrition tips
                </button>
<button class="glass px-5 py-2.5 rounded-full text-label-md font-semibold text-primary border-0 hover:bg-white transition-colors">
                    Symptom checker
                </button>
</div>
</div>
</main>
<!-- Input and Navigation Floating Container -->
<div class="fixed bottom-0 left-0 w-full flex flex-col z-50">
<!-- Chat Input Field -->
<div class="px-6 mb-8 w-full max-w-2xl mx-auto">
<div class="glass flex items-center gap-2 p-3 rounded-full shadow-lg">
<button class="p-2 text-primary hover:bg-primary-container/20 rounded-full transition-colors">
<span class="material-symbols-outlined">mic</span>
</button>
<input class="flex-grow bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-outline py-2 px-2 font-body" placeholder="Message Rose..." type="text"/>
<button class="bg-primary hover:bg-on-primary-fixed-variant text-on-primary w-11 h-11 rounded-full flex items-center justify-center shadow-md transition-all active:scale-90">
<span class="material-symbols-outlined">arrow_upward</span>
</button>
</div>
</div>
<!-- BottomNavBar -->
<nav class="bg-white/80 dark:bg-zinc-900/80 backdrop-blur-2xl rounded-t-[3rem] shadow-[0px_-12px_32px_rgba(244,194,194,0.1)] flex justify-around items-center px-4 pb-8 pt-4">
<a class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 hover:text-[#F4C2C2] transition-colors" href="#">
<span class="material-symbols-outlined mb-1">home_health</span>
<span class="font-['Manrope'] text-[10px] font-semibold tracking-wide uppercase">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 hover:text-[#F4C2C2] transition-colors" href="#">
<span class="material-symbols-outlined mb-1">edit_note</span>
<span class="font-['Manrope'] text-[10px] font-semibold tracking-wide uppercase">Log</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 hover:text-[#F4C2C2] transition-colors" href="#">
<span class="material-symbols-outlined mb-1">calendar_today</span>
<span class="font-['Manrope'] text-[10px] font-semibold tracking-wide uppercase">Calendar</span>
</a>
<!-- Active Tab: Agent -->
<a class="flex flex-col items-center justify-center bg-[#F4C2C2]/20 text-[#F4C2C2] rounded-full px-5 py-2 Active: scale-90 duration-300 ease-out" href="#">
<span class="material-symbols-outlined mb-0.5" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
<span class="font-['Manrope'] text-[10px] font-semibold tracking-wide uppercase">Agent</span>
</a>
<a class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 hover:text-[#F4C2C2] transition-colors" href="#">
<span class="material-symbols-outlined mb-1">self_care</span>
<span class="font-['Manrope'] text-[10px] font-semibold tracking-wide uppercase">Wellness</span>
</a>
</nav>
</div>
<!-- Decorative Gradient Blobs -->
<div class="fixed top-[20%] right-[-5%] w-64 h-64 bg-primary-container rounded-full mix-blend-multiply filter blur-3xl opacity-20 -z-10"></div>
<div class="fixed bottom-[40%] left-[-10%] w-96 h-96 bg-secondary-container rounded-full mix-blend-multiply filter blur-3xl opacity-20 -z-10"></div>
</body></html>
